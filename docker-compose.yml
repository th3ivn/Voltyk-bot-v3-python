services:
  bot:
    build: .
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    environment:
      - BOT_MODE=webhook

  celery-worker:
    build: .
    env_file: .env
    command: celery -A src.queues.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  celery-beat:
    build: .
    env_file: .env
    command: celery -A src.queues.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
