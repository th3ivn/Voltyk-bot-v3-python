version: "3.9"

# Note: PostgreSQL (Neon) is an external service — not included here.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.main

  celery_worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-15}
      --queues=notifications,schedule,channels,celery

  celery_beat:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
