services:
  # One-shot migration job: runs alembic upgrade head against the postgres
  # service and exits.  The bot service waits for it to complete successfully
  # before starting, which decouples schema migrations from bot startup and
  # makes multi-replica rollouts safe (no concurrent ALTER TABLE locks).
  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # on_shutdown waits up to 10s for background tasks plus additional
    # teardown (chart_cache, HTTP client, DB pool).  Give Docker a 30s
    # window to avoid SIGKILL mid-shutdown.
    stop_grace_period: 30s
    stop_signal: SIGTERM

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voltyk
      POSTGRES_USER: postgres
      # Override POSTGRES_PASSWORD in your .env or environment for production.
      # This default is for local development only and must NOT be used in production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voltyk"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
