[project]
name = "voltyk-bot-v3"
version = "3.0.0"
description = "Voltyk Bot v3 — Power outage monitoring for Ukraine"
requires-python = ">=3.12"
dependencies = [
    "aiogram>=3.13,<4.0",
    "aiohttp>=3.10,<4.0",
    "sqlalchemy[asyncio]>=2.0,<3.0",
    "asyncpg>=0.29,<1.0",
    "alembic>=1.13,<2.0",
    "celery[redis]>=5.4,<6.0",
    "pydantic>=2.0,<3.0",
    "pydantic-settings>=2.0,<3.0",
    "loguru>=0.7,<1.0",
    "structlog>=24.0",
    "redis>=5.0,<6.0",
    "python-dotenv>=1.0,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
