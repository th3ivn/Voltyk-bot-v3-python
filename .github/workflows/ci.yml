name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check bot/ --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" mypy

      - name: Run mypy
        # --ignore-missing-imports: many aiogram/SQLAlchemy stubs are incomplete
        # or absent; removing this flag requires stub packages for every
        # third-party library we use.  Gradually add stubs and remove this flag.
        # --disable-error-code=union-attr: suppresses false-positive attribute
        # access errors on Optional types that are already guarded at runtime.
        run: mypy bot/ --ignore-missing-imports --disable-error-code=union-attr

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          # Temporarily disable set -e so a pytest failure doesn't abort the
          # script before we can write the step summary and error annotations.
          # PIPESTATUS[0] correctly captures pytest's exit code after the
          # pipeline because set +e means the shell never falls through to
          # || true (which would reset PIPESTATUS to (0,)).
          set +e
          pytest --cov=bot --cov-report=term-missing --cov-fail-under=30 2>&1 | tee /tmp/pytest-output.txt
          PYTEST_EXIT="${PIPESTATUS[0]}"
          set -e

          # Write full pytest output to job summary (visible in GitHub Actions UI)
          {
            echo "## Pytest Output"
            echo '```'
            cat /tmp/pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit ::error:: annotations for FAILED/ERROR lines so they show as
          # check-run annotations and are visible via the GitHub Checks API.
          grep -E "(^FAILED|^ERROR| FAILED$)" /tmp/pytest-output.txt \
            | head -20 \
            | while IFS= read -r line; do echo "::error::${line}"; done || true

          exit "${PYTEST_EXIT}"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t voltyk-bot-test . --no-cache

  migrations:
    name: Migration check (alembic)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voltyk
          POSTGRES_PASSWORD: voltyk
          POSTGRES_DB: voltyk_test
        options: >-
          --health-cmd "pg_isready -U voltyk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://voltyk:voltyk@localhost:5432/voltyk_test
          BOT_TOKEN: "0:test"
        run: alembic upgrade head

      - name: Check alembic heads (no unmerged branches)
        env:
          DATABASE_URL: postgresql+asyncpg://voltyk:voltyk@localhost:5432/voltyk_test
          BOT_TOKEN: "0:test"
        run: |
          HEAD_COUNT=$(alembic heads 2>/dev/null | grep -c "(head)" || true)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 Alembic head, found $HEAD_COUNT. Merge divergent migration branches before merging this PR."
            alembic heads --verbose
            exit 1
          fi
          echo "Alembic head count: $HEAD_COUNT ✓"
