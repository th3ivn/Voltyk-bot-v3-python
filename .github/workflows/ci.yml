name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check bot/ --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" mypy

      - name: Run mypy
        # --ignore-missing-imports: many aiogram/SQLAlchemy stubs are incomplete
        # or absent; removing this flag requires stub packages for every
        # third-party library we use.  Gradually add stubs and remove this flag.
        # --disable-error-code=union-attr: suppresses false-positive attribute
        # access errors on Optional types that are already guarded at runtime.
        run: mypy bot/ --ignore-missing-imports --disable-error-code=union-attr

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          # || true prevents set -e from aborting before we capture PIPESTATUS.
          # PIPESTATUS[0] is pytest's exit code regardless of tee's exit code.
          pytest --cov=bot --cov-report=term-missing 2>&1 | tee /tmp/pytest-output.txt || true
          PYTEST_EXIT="${PIPESTATUS[0]}"

          # Write full pytest output to job summary (visible in GitHub Actions UI)
          {
            echo "## Pytest Output"
            echo '```'
            cat /tmp/pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit ::error:: annotations for FAILED/ERROR lines so they show as
          # check-run annotations and are visible via the GitHub Checks API.
          grep -E "(^FAILED|^ERROR| FAILED$)" /tmp/pytest-output.txt \
            | head -20 \
            | while IFS= read -r line; do echo "::error::${line}"; done || true

          exit "${PYTEST_EXIT}"
